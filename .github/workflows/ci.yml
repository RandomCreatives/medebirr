name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax (public + root)
        run: |
          echo "Validating public JS files…"
          find public -name '*.js' -not -path '*/i18n/*' -exec node --check {} \;
          node --check scripts/validate-i18n.js
          node --check gen_i18n.js

      - name: Validate i18n keys
        run: node scripts/validate-i18n.js

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Run unit tests
        run: npm test
