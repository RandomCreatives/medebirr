<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>መደብር | Medebirr — Ethiopia's Telegram Marketplace</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="stylesheet" href="css/app.css?v=7e09bd5">
<script>
  // Apply theme instantly before render (prevent flash)
  const t = localStorage.getItem('em_theme');
  document.documentElement.setAttribute('data-theme', t || 'light');
</script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOADING SCREEN
═══════════════════════════════════════════════════ -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">መደብር | Medebirr</div>
    <div class="logo-sub">Ethiopia's Free Shopping Experience</div>
  </div>
  <div class="loading-spinner"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     ONBOARDING SPLASH (first-time users)
═══════════════════════════════════════════════════ -->
<div id="onboardingScreen" class="onboarding-screen" style="display:none;">
  <div class="onboard-splash">
    <div class="onboard-logo">M</div>
    <div class="onboard-brand">መደብር | Medebirr</div>
    <div class="onboard-tagline">Ethiopia's Telegram Marketplace</div>
  </div>
  <div class="slide-to-enter" id="slideToEnter">
    <div class="slide-track">
      <div class="slide-thumb" id="slideThumb">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="slide-label" id="slideLabel">Slide to enter →</div>
    </div>
  </div>
</div>

<!-- Floating Overlay — Luxury centered card for seller onboarding -->
<div class="float-overlay" id="floatOverlay">
  <div class="float-card" id="floatCard"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════ -->
<div id="app" class="app-shell" style="display:none;">

  <!-- Top Header -->
  <header class="app-header" id="appHeader">
    <div class="header-left">
      <div class="header-logo">M</div>
      <div class="header-brand">
        <div class="header-username" id="headerUsername" data-i18n="appTitle">መደብር | Medebirr</div>
        <div class="header-location" id="headerLocation" data-i18n="appTagline">Ethiopia's Marketplace</div>
      </div>
    </div>
    <div class="header-right">
      <button class="header-icon-btn" id="notifBtn" onclick="App.toggleNotifications()" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none;"></span>
      </button>
    </div>
  </header>

  <!-- Role Switcher Bar -->
  <div class="role-bar" id="roleBar">
    <div class="role-search-wrap" id="roleSearchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="role-search-input" id="searchInput"
             placeholder="Search products, shops..."
             oninput="App.handleSearch(this.value)" />
    </div>
    <span class="role-badge buyer-badge" id="roleBadge" style="display:none;">🛒 Buyer Hub</span>
    <span class="role-shop-name" id="roleShopName" style="display:none;"></span>
    <div class="role-sub" id="roleSub" style="display:none;"></div>
    <button class="role-switch-btn" id="roleSwitchBtn" onclick="App.toggleRole()">
      Seller Studio
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <button class="role-menu-btn" id="roleMenuBtn" style="display:none;"
            onclick="App.openSellerSettings()" aria-label="Account and settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
    </button>
  </div>

  <!-- Main Content Area -->
  <main class="app-body" id="appBody">
    <!-- Rendered dynamically by JS -->
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav">
    <!-- Rendered dynamically -->
  </nav>

  <!-- Modal Sheet -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="App.closeModalOnBg(event)">
    <div class="modal-sheet" id="modalSheet"></div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Branding Footer -->
  <div class="app-footer">
    Random Creatives Studio · v1.3.0 · © 2018 E.C.
  </div>

</div>

<!-- Full-Screen Checkout Page (OUTSIDE app-shell to avoid overflow:hidden) -->
<div class="checkout-overlay" id="checkoutOverlay">
  <div class="checkout-page" id="checkoutPage"></div>
</div>

<!-- Core app logic -->
<script src="js/api.js?v=7e09bd5"></script>
<script src="js/state.js?v=7e09bd5"></script>
<script src="js/views/buyer.js?v=7e09bd5"></script>
<script src="js/views/seller.js?v=7e09bd5"></script>
<script src="js/views/modals.js?v=7e09bd5"></script>
<script src="js/views/checkout.js?v=7e09bd5"></script>
<script src="js/app.js?v=7e09bd5"></script>
</body>
</html>
