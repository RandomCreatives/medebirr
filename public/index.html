<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>መደብር | Medebirr — Ethiopia's Telegram Marketplace</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="stylesheet" href="css/app.css?v=6">
<script>
  // Apply theme instantly before render (prevent flash)
  const t = localStorage.getItem('em_theme');
  document.documentElement.setAttribute('data-theme', t || 'light');
</script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOADING SCREEN
═══════════════════════════════════════════════════ -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-logo">
    <div class="logo-mark">M</div>
    <div class="logo-text">መደብር | Medebirr</div>
    <div class="logo-sub">Ethiopia's Free Shopping Experience</div>
  </div>
  <div class="loading-spinner"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     ONBOARDING SPLASH (first-time users)
═══════════════════════════════════════════════════ -->
<div id="onboardingScreen" class="onboarding-screen" style="display:none;">
  <div class="onboard-splash">
    <div class="onboard-logo">M</div>
    <div class="onboard-brand">መደብር | Medebirr</div>
    <div class="onboard-tagline">Ethiopia's Telegram Marketplace</div>
  </div>
  <div class="slide-to-enter" id="slideToEnter">
    <div class="slide-track">
      <div class="slide-thumb" id="slideThumb">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="slide-label" id="slideLabel">Slide to enter →</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════ -->
<div id="app" class="app-shell" style="display:none;">

  <!-- Top Header -->
  <header class="app-header" id="appHeader">
    <div class="header-left">
      <div class="header-logo">M</div>
      <div class="header-brand">
        <div class="header-username" id="headerUsername" data-i18n="appTitle">መደብር | Medebirr</div>
        <div class="header-location" id="headerLocation" data-i18n="appTagline">Ethiopia's Marketplace</div>
      </div>
    </div>
    <div class="header-right">
      <button class="header-icon-btn" id="notifBtn" onclick="App.toggleNotifications()" aria-label="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="notif-dot" id="notifDot" style="display:none;"></span>
      </button>
      <button class="header-icon-btn lang-swap" id="langBtn" onclick="App.cycleLanguage()" aria-label="Switch Language" title="Switch Language">
        <span id="langLabel">EN</span>
      </button>
    </div>
  </header>

  <!-- Role Switcher Bar -->
  <div class="role-bar" id="roleBar">
    <div class="role-info">
      <span class="role-badge buyer-badge" id="roleBadge">🛒 Buyer Hub</span>
      <div class="role-sub" id="roleSub">Verified Ethiopian Shops</div>
    </div>
    <button class="role-switch-btn" id="roleSwitchBtn" onclick="App.toggleRole()">
      Seller Studio
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Main Content Area -->
  <main class="app-body" id="appBody">
    <!-- Rendered dynamically by JS -->
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav">
    <!-- Rendered dynamically -->
  </nav>

  <!-- Modal Sheet -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="App.closeModalOnBg(event)">
    <div class="modal-sheet" id="modalSheet"></div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Branding Footer -->
  <div class="app-footer">
    Random Creatives Studio · v1.2.2 · © 2018 E.C.
  </div>

</div>

<!-- Core app logic -->
<script src="js/api.js?v=5"></script>
<script src="js/state.js?v=5"></script>
<script src="js/views/buyer.js?v=5"></script>
<script src="js/views/seller.js?v=5"></script>
<script src="js/views/modals.js?v=5"></script>
<script src="js/app.js?v=5"></script>
</body>
</html>
