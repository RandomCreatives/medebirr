<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Merkato | Your Free Shopping Experience</title>
<style>
  :root {
    --bg-main: #0B0C0E;
    --bg-surface: #15171C;
    --bg-card: #1E2027;
    --bg-hover: #282B34;
    --text-primary: #FFFFFF;
    --text-secondary: #9DA3AE;
    --text-muted: #646A78;
    --accent: #FCCD04;
    --accent-hover: #E5B900;
    --accent-text: #111216;
    --success: #10B981;
    --warning: #F59E0B;
    --danger: #EF4444;
    --info: #3B82F6;
    --border: #2D303A;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 8px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: #050507;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
  }

  /* App Device Frame */
  .device-shell {
    width: 100%;
    max-width: 480px;
    background-color: var(--bg-main);
    border-radius: 32px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    max-height: 96vh;
  }

  /* Telegram Header & Live Traffic Ticker */
  .tg-header {
    background: #121419;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FCCD04, #F59E0B);
    color: var(--accent-text);
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }
  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .pulse-dot {
    width: 8px;
    height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.95); opacity: 0.8; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(0.95); opacity: 0.8; }
  }

  /* Unified Workspace Role Switcher */
  .role-bar {
    background: var(--bg-surface);
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mode-tag {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 10px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mode-buyer { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
  .mode-seller { background: rgba(252, 205, 4, 0.2); color: var(--accent); }

  .role-switch-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .role-switch-btn:hover { border-color: var(--accent); background: var(--bg-hover); }

  /* Scrollable Body */
  .app-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 84px;
  }
  .app-body::-webkit-scrollbar { width: 4px; }
  .app-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Discovery Search & Advanced Filters */
  .search-box {
    position: relative;
    margin-bottom: 12px;
  }
  .search-input {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px 12px 40px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  /* Filter Pills */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-pill.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  /* Marketplace Item Grid */
  .item-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .item-card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }
  .item-card:hover { border-color: #4A4E5A; }
  .item-img {
    height: 140px;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .store-badge {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(11, 12, 14, 0.85);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .policy-tag {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(16, 185, 129, 0.9);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .item-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    justify-content: space-between;
  }
  .item-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item-location {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .item-price {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .btn-action {
    width: 100%;
    padding: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: white;
    border-radius: 10px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-action:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* Store-Grouped Cart Packages */
  .store-package {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .package-header {
    background: var(--bg-surface);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .store-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 13px;
  }
  .package-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .package-footer {
    padding: 12px 14px;
    background: rgba(252, 205, 4, 0.04);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-checkout-store {
    background: var(--accent);
    color: var(--accent-text);
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 12px;
    border: none;
    cursor: pointer;
  }

  /* Bottom Navigation */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #101217;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    z-index: 30;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 11px;
    cursor: pointer;
    position: relative;
  }
  .nav-item.active { color: var(--accent); font-weight: 700; }
  .badge {
    position: absolute;
    top: -4px;
    right: 10px;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* Seller Studio Cards */
  .seller-stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .seller-stat {
    background: var(--bg-card);
    padding: 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
  }
  .policy-config-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 14px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .form-select, .form-input {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: white;
    font-size: 13px;
    outline: none;
  }

  /* Modal Sheet */
  .modal-backdrop {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-end;
    z-index: 50;
  }
  .modal-backdrop.active { display: flex; }
  .modal-box {
    background: var(--bg-card);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 20px;
    max-height: 88vh;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
</style>
</head>

  // Cart grouped by seller/shop
  let cart = [
    {
      item: catalog[0], // iPhone from Bole Tech

    {
      item: catalog[3], // Headphones from Bole Tech

    {
      item: catalog[1], // Suit from Shiro Meda

  function toggleRole() {
    currentRole = currentRole === 'buyer' ? 'seller' : 'buyer';
    const badge = document.getElementById('roleBadge');
    const subtext = document.getElementById('roleSubtext');
    const switchBtn = document.getElementById('switchBtnText');

    if (currentRole === 'buyer') {
      badge.className = 'mode-tag mode-buyer';
      badge.innerHTML = '🛒 e-Merkato Discovery Hub';
      subtext.innerText = 'Navigating 1,000+ Verified Ethiopian Shops';
      switchBtn.innerText = 'Open Seller Studio';
      currentTab = 'explore';
    } else {
      badge.className = 'mode-tag mode-seller';
      badge.innerHTML = '🏬 Verified Seller Studio';
      subtext.innerText = 'Store ID: #892 • Bole Apple & Tech Hub';
      switchBtn.innerText = 'Switch to Buyer Hub';
      currentTab = 'dashboard';

    renderApp();

  function switchTab(tab) {
    currentTab = tab;
    renderApp();
  }

  function filterCatalog(filter) {
    activeFilter = filter;
    renderApp();
  }

  function handleSearch(val) {
    searchQuery = val.toLowerCase();
    renderApp();

  function renderApp() {
    renderBottomNav();
    const content = document.getElementById('appContent');

    if (currentRole === 'buyer') {
      if (currentTab === 'explore') renderBuyerExplore(content);

      else if (currentTab === 'wishlist') renderBuyerWishlist(content);
      else if (currentTab === 'orders') renderBuyerOrders(content);
    } else {
      if (currentTab === 'dashboard') renderSellerDashboard(content);
      else if (currentTab === 'inventory') renderSellerInventory(content);
      else if (currentTab === 'policies') renderSellerPolicies(content);
      else if (currentTab === 'dispatch') renderSellerDispatch(content);
    }
  }

        </button>
      `;
    } else {
      nav.innerHTML = `

        </button>

  function addToCart(id) {
    const item = catalog.find(i => i.id === id);

  function renderBuyerCart(container) {

    // Group items by shopId
    const groups = {};
    cart.forEach(c => {

        groups[c.item.shopId] = {
          shopName: c.item.shopName,
          location: c.item.location,
          returnPolicy: c.item.returnPolicy,
          deliveryFee: c.item.deliveryFee,
          paymentAccounts: c.item.paymentAccounts,
