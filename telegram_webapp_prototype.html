<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bekollo Pro | Multi-Group Telegram Web App</title>
<style>
  :root {
    --tg-bg: #18191D;
    --tg-card: #22242A;
    --tg-card-hover: #2C2F36;
    --tg-text: #FFFFFF;
    --tg-subtext: #9DA3AE;
    --tg-border: #33363F;
    --primary: #FCCD04;
    --primary-hover: #E5B900;
    --primary-text: #18191D;
    --success: #10B981;
    --danger: #EF4444;
    --info: #3B82F6;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: #0F1013;
    color: var(--tg-text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 10px;
  }

  /* App Shell Simulator */
  .app-shell {
    width: 100%;
    max-width: 440px;
    background-color: var(--tg-bg);
    border-radius: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--tg-border);
    position: relative;
    max-height: 94vh;
  }

  /* Top Bar Simulator */
  .telegram-header {
    background-color: #1F2127;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--tg-border);
    font-size: 14px;
    z-index: 10;
  }
  .tg-user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #A855F7, #EC4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    color: white;
  }

  /* Role Switcher Bar */
  .role-switcher {
    background: #1A1C22;
    padding: 10px 16px;
    border-bottom: 1px solid var(--tg-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .role-badge {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 8px;
    border-radius: 6px;
    font-weight: 700;
  }
  .role-shopper { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
  .role-admin { background: rgba(252, 205, 4, 0.2); color: var(--primary); }

  .toggle-btn {
    background: var(--tg-card);
    border: 1px solid var(--tg-border);
    color: var(--tg-text);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .toggle-btn:hover { background: var(--tg-card-hover); border-color: var(--primary); }

  /* Group Selector (Multi-Tenant Hub) */
  .group-banner {
    background: linear-gradient(135deg, #2A2D35 0%, #1E2026 100%);
    padding: 14px 16px;
    border-bottom: 1px solid var(--tg-border);
  }
  .group-select-wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-select {
    background: var(--tg-bg);
    color: white;
    border: 1px solid var(--tg-border);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    width: 100%;
  }

  /* Scrollable Content Area */
  .content-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 80px;
  }
  .content-scroll::-webkit-scrollbar { width: 4px; }
  .content-scroll::-webkit-scrollbar-thumb { background: var(--tg-border); border-radius: 4px; }

  /* Navigation Tabs */
  .nav-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-item {
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--tg-card);
    color: var(--tg-subtext);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .tab-item.active {
    background: var(--primary);
    color: var(--primary-text);
  }

  /* Product Grid */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 12px;
  }
  .product-card {
    background: var(--tg-card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--tg-border);
    display: flex;
    flex-direction: column;
    position: relative;
    transition: transform 0.2s;
  }
  .product-card:active { transform: scale(0.98); }
  .product-img {
    width: 100%;
    height: 150px;
    background-size: cover;
    background-position: center;
    background-color: #2D3039;
    position: relative;
  }
  .wishlist-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    border: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .wishlist-btn.active { color: #EF4444; }
  .product-info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    justify-content: space-between;
  }
  .product-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--tg-text);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-group-tag {
    font-size: 11px;
    color: var(--tg-subtext);
    margin-bottom: 8px;
  }
  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 10px;
  }
  .btn-select {
    width: 100%;
    padding: 8px;
    background: var(--primary);
    color: var(--primary-text);
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-select:hover { opacity: 0.9; }

  /* Bottom Navigation Bar */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1F2127;
    border-top: 1px solid var(--tg-border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    z-index: 20;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--tg-subtext);
    font-size: 11px;
    cursor: pointer;
    position: relative;
  }
  .nav-btn.active { color: var(--primary); font-weight: 600; }
  .nav-badge {
    position: absolute;
    top: -4px;
    right: 12px;
    background: var(--primary);
    color: var(--primary-text);
    font-size: 10px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* Admin Dashboard Styles */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--tg-card);
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--tg-border);
  }
  .stat-label { font-size: 12px; color: var(--tg-subtext); margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 800; color: var(--tg-text); }
  .stat-sub { font-size: 11px; color: var(--success); margin-top: 4px; }

  .admin-section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 20px 0 10px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .order-card {
    background: var(--tg-card);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--tg-border);
  }
  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--tg-border);
    padding-bottom: 8px;
    margin-bottom: 8px;
  }
  .order-id { font-weight: 700; font-size: 14px; }
  .status-badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
  .status-pending { background: rgba(252, 205, 4, 0.2); color: #FCCD04; }
  .status-delivery { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
  .status-completed { background: rgba(16, 185, 129, 0.2); color: #10B981; }

  .order-details { font-size: 13px; color: var(--tg-subtext); line-height: 1.5; }
  .order-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn-action {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--primary); color: var(--primary-text); }
  .btn-secondary { background: var(--tg-border); color: white; }

  /* Forms & Modals */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--tg-subtext); margin-bottom: 6px; }
  .form-input {
    width: 100%;
    padding: 10px 12px;
    background: #131417;
    border: 1px solid var(--tg-border);
    border-radius: 10px;
    color: white;
    font-size: 14px;
    outline: none;
  }
  .form-input:focus { border-color: var(--primary); }

  .modal-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: flex-end;
    z-index: 50;
    backdrop-filter: blur(5px);
  }
  .modal-overlay.active { display: flex; }
  .modal-sheet {
    background: var(--tg-card);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 20px;
    max-height: 85vh;
    overflow-y: auto;
    border-top: 1px solid var(--tg-border);
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--tg-border);
  }
</style>
</head>
<body>

<div class="app-shell">
  <!-- Telegram App Header -->
  <div class="telegram-header">
    <div class="tg-user-info">
      <div class="tg-avatar">M</div>
      <div>
        <div style="font-weight: 700;">Mike Fikadu</div>
        <div style="font-size: 11px; color: var(--tg-subtext);">@Mike_Fikadu • Addis Ababa</div>
      </div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <span style="font-size: 12px; background: #2D3039; padding: 4px 8px; border-radius: 12px;">ETB / Br</span>
    </div>
  </div>

  <!-- Role Switcher -->
  <div class="role-switcher">
    <div style="display: flex; align-items: center; gap: 8px;">
      <span id="roleBadge" class="role-badge role-shopper">Shopper Mode</span>
      <span style="font-size: 12px; color: var(--tg-subtext);" id="roleDesc">Browsing Store catalog</span>
    </div>
    <button class="toggle-btn" onclick="toggleRole()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      Switch to <span id="switchTargetText">Group Admin</span>
    </button>
  </div>

  <!-- Group / Store Selector Banner -->
  <div class="group-banner">
    <div style="font-size: 11px; color: var(--tg-subtext); margin-bottom: 4px;">ACTIVE TELEGRAM GROUP / STORE</div>
    <select class="group-select" id="groupSelect" onchange="changeGroup()">
      <option value="all">🌐 All Ethiopian Group Stores (Marketplace Feed)</option>
      <option value="addis_fashion" selected>👗 Addis Fashion Hub (@AddisStyleGroup)</option>
      <option value="bole_gadgets">📱 Bole Gadgets & Electronics (@BoleTechDeals)</option>
      <option value="merkato_shoes">👟 Merkato Direct Footwear (@MerkatoShoes)</option>
    </select>
  </div>

  <!-- Main Scrollable Container -->
  <div class="content-scroll" id="mainContent">
    <!-- Dynamic Content Loaded Here via JS -->
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-nav" id="bottomNav">
    <!-- Rendered via JS depending on role -->
  </div>

  <!-- Modal Sheet for Checkout/Add Product -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
    <div class="modal-sheet" id="modalContent"></div>
  </div>
</div>

<script>
  // State Management
  let currentRole = 'shopper'; // 'shopper' or 'admin'
  let currentTab = 'shop';
  let activeGroup = 'addis_fashion';
  let cart = [];
  let wishlist = [1, 4];

  // Dummy Data: Products across different Telegram sell/buy groups
  let products = [
    {
      id: 1,
      name: "Malia Neon Green Sports T-Shirt",
      group: "addis_fashion",
      groupName: "Addis Fashion Hub",
      price: 399,
      category: "Men",
      stock: 24,
      image: "linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%)"
    },
    {
      id: 2,
      name: "Malia Royal Blue Dry-Fit T-Shirt",
      group: "addis_fashion",
      groupName: "Addis Fashion Hub",
      price: 399,
      category: "Men",
      stock: 15,
      image: "linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)"
    },
    {
      id: 3,
      name: "Light Blue Summer Linen Polo Shirt",
      group: "addis_fashion",
      groupName: "Addis Fashion Hub",
      price: 650,
      category: "Men",
      stock: 8,
      image: "linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)"
    },
    {
      id: 4,
      name: "Apple AirPods Pro 2nd Gen (USB-C)",
      group: "bole_gadgets",
      groupName: "Bole Gadgets & Electronics",
      price: 14500,
      category: "Electronics",
      stock: 5,
      image: "linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)"
    },
    {
      id: 5,
      name: "Anker 20,000mAh Power Bank Type-C",
      group: "bole_gadgets",
      groupName: "Bole Gadgets & Electronics",
      price: 3200,
      category: "Electronics",
      stock: 12,
      image: "linear-gradient(135deg, #434343 0%, #000000 100%)"
    },
    {
      id: 6,
      name: "Men's Orthopedic Running Sneakers",
      group: "merkato_shoes",
      groupName: "Merkato Direct Footwear",
      price: 2400,
      category: "Shoes",
      stock: 18,
      image: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"
    }
  ];

  // Dummy Data: Orders in Admin Mode
  let orders = [
    {
      id: "10245",
      customer: "Abebe Bikila (@Abebe_B)",
      phone: "+251 911 234 567",
      address: "Bole Sub-City, Woreda 03, House 412, Addis Ababa",
      items: "2x Malia Neon Green Sports T-Shirt",
      total: 798,
      deliveryFee: 150,
      paymentMethod: "Telebirr (Verified: TX8912J)",
      status: "pending"
    },
    {
      id: "10244",
      customer: "Sara Tadesse (@Sara_Tad)",
      phone: "+251 922 889 900",
      address: "Kazanchis near Jupiter Hotel, Addis Ababa",
      items: "1x Light Blue Summer Linen Polo Shirt",
      total: 650,
      deliveryFee: 150,
      paymentMethod: "Cash on Delivery",
      status: "delivery"
    }
  ];

  function toggleRole() {
    currentRole = currentRole === 'shopper' ? 'admin' : 'shopper';
    const badge = document.getElementById('roleBadge');
    const desc = document.getElementById('roleDesc');
    const target = document.getElementById('switchTargetText');

    if (currentRole === 'shopper') {
      badge.className = 'role-badge role-shopper';
      badge.innerText = 'Shopper Mode';
      desc.innerText = 'Browsing Store catalog';
      target.innerText = 'Group Admin';
      currentTab = 'shop';
    } else {
      badge.className = 'role-badge role-admin';
      badge.innerText = 'Group Admin Mode';
      desc.innerText = 'Managing products & orders';
      target.innerText = 'Shopper View';
      currentTab = 'dashboard';
    }
    renderApp();
  }

  function changeGroup() {
    activeGroup = document.getElementById('groupSelect').value;
    renderApp();
  }

  function renderApp() {
    renderBottomNav();
    const content = document.getElementById('mainContent');

    if (currentRole === 'shopper') {
      if (currentTab === 'shop') renderShopperHome(content);
      else if (currentTab === 'cart') renderCart(content);
      else if (currentTab === 'orders') renderCustomerOrders(content);
      else if (currentTab === 'profile') renderCustomerProfile(content);
    } else {
      if (currentTab === 'dashboard') renderAdminDashboard(content);
      else if (currentTab === 'products') renderAdminProducts(content);
      else if (currentTab === 'orders_admin') renderAdminOrders(content);
      else if (currentTab === 'settings') renderAdminSettings(content);
    }
  }

  function renderBottomNav() {
    const nav = document.getElementById('bottomNav');
    if (currentRole === 'shopper') {
      const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
      nav.innerHTML = `
        <button class="nav-btn ${currentTab === 'shop' ? 'active' : ''}" onclick="switchTab('shop')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <span>Storefront</span>
        </button>
        <button class="nav-btn ${currentTab === 'cart' ? 'active' : ''}" onclick="switchTab('cart')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          ${cartCount > 0 ? `<span class="nav-badge">${cartCount}</span>` : ''}
          <span>Cart</span>
        </button>
        <button class="nav-btn ${currentTab === 'orders' ? 'active' : ''}" onclick="switchTab('orders')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          <span>My Orders</span>
        </button>
        <button class="nav-btn ${currentTab === 'profile' ? 'active' : ''}" onclick="switchTab('profile')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Wallet & Hub</span>
        </button>
      `;
    } else {
      nav.innerHTML = `
        <button class="nav-btn ${currentTab === 'dashboard' ? 'active' : ''}" onclick="switchTab('dashboard')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn ${currentTab === 'products' ? 'active' : ''}" onclick="switchTab('products')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <span>Products</span>
        </button>
        <button class="nav-btn ${currentTab === 'orders_admin' ? 'active' : ''}" onclick="switchTab('orders_admin')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="nav-badge">1</span>
          <span>Orders</span>
        </button>
        <button class="nav-btn ${currentTab === 'settings' ? 'active' : ''}" onclick="switchTab('settings')">

    const item = products.find(p => p.id === id);

    if (existing) existing.qty++;
